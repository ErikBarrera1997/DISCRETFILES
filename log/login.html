<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiscretFiles - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="login_styles.css">
</head>
<body>

  <!-- <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div> -->

  <header class="topbar">
    <div class="brand">
       <!-- <span class="brand-mark"></span> -->
      <h1>DiscretFiles</h1>
    </div>
    <div class="topbar-actions">
      <a class="topbar-btn" href="index.html">
        <i class="fa-solid fa-arrow-left"></i>
        Volver
      </a>
      <a class="topbar-btn" href="logout.html">
        <i class="fa-solid fa-user"></i>
        Log On
      </a>
    </div>
  </header>

  <main class="auth">
    <section class="auth-panels">
      <div class="panel">
        <h3>Log in</h3>
        <p class="panel-note">Add your username and password to login.</p>
        <form class="form" autocomplete="off">
          <label for="login-user">Username</label>
          <input id="login-user" type="text" placeholder="Your username" required>

          <label for="login-pass">Password</label>
          <input id="login-pass" type="password" placeholder="••••••••" required>

          <button class="primary" type="submit">Entrar</button>
          <p class="helper">You forgot your password? <span>Recover password</span></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 DiscretFiles. All rights reserved.</p>
  </footer>
</body>
</html>

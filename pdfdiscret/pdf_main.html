<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDFDISCRET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/pdf_main.css">
</head>
<body>
    <header>
        <h1>PDFDISCRET</h1>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Insert name or keyword">
            <button type="button">Search</button>
        </section>

        <section class="results">
            <h2>Results</h2>
            <div class="results-grid">
                <div class="image-placeholder" aria-label="Image placeholder">
                    <span>Image preview</span>
                </div>
                <div class="info-placeholder" aria-label="PDF info placeholder">
                    <span>PDF info</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDFDISCRET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/pdf_main.css">
</head>
<body>
    <header>
        <h1>PDFDISCRET</h1>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Insert name or keyword">
            <button onclick="searchPdf()">Search</button>
            <div id="loadingSpinner" style="display: none; text-align: center; margin-top: 10px;">
                <div class="spinner"></div>
            </div>
        </section>

        <section id="results" style="display: none;">
            <h2>Results</h2>
            <div class="results-grid">
                <div class="info-placeholder" id="infoPlaceholder">
                    <span>PDF info</span>
                </div>
            </div>
        </section>
    </main>

    <script src="../config.js"></script>
    <script src="js/main_menu.js"></script>
</body>
</html>
